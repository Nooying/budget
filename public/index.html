/* ====== MONTHLY_DATA — อ่านจาก localStorage จริง ====== */
function buildMonthlyData(yearParam,usernameFilter){
  // Budget: ใช้ cf_budgets (Budget CF) เป็นแหล่งเดียว
  const cfBudgets=ls.get('cf_budgets',[]);
  const allActuals=ls.get('actual_records',[]);
  const allDailyCF=ls.get('daily_cashflow',[]);
  const actuals=usernameFilter?allActuals.filter(r=>!r.created_by||r.created_by===usernameFilter):allActuals;
  const dailyCF=usernameFilter?allDailyCF.filter(r=>!r.created_by||r.created_by===usernameFilter):allDailyCF;
  const yr=(yearParam||new Date().getFullYear()).toString();
  return Array.from({length:12},(_,i)=>{
    const m=i+1;
    const prefix=`${yr}-${String(m).padStart(2,'0')}`;
    // Budget มาจาก Budget CF เท่านั้น
    const rev_budget=cfBudgets.filter(r=>r.date?.startsWith(prefix)&&r.flow==='in').reduce((s,r)=>s+(+r.amount||0),0);
    const exp_budget=cfBudgets.filter(r=>r.date?.startsWith(prefix)&&r.flow==='out').reduce((s,r)=>s+(+r.amount||0),0);
    // Actual มาจาก บันทึกผลจริง + Cash Flow รายวัน
    const rev_actual=actuals.filter(r=>r.type==='revenue'&&r.date?.startsWith(prefix)).reduce((s,r)=>s+(+r.amount||0),0)
      +dailyCF.filter(r=>r.date?.startsWith(prefix)&&r.flow==='in'&&r.entry_type==='actual').reduce((s,r)=>s+(+r.amount||0),0);
    const exp_actual=actuals.filter(r=>r.type==='expense'&&r.date?.startsWith(prefix)).reduce((s,r)=>s+(+r.amount||0),0)
      +dailyCF.filter(r=>r.date?.startsWith(prefix)&&r.flow==='out'&&r.entry_type==='actual').reduce((s,r)=>s+(+r.amount||0),0);
    return{month:m,label:MONTHS_EN[i],rev_budget,rev_actual,exp_budget,exp_actual,profit_budget:rev_budget-exp_budget,profit_actual:rev_actual-exp_actual};
  });
}

/* ====== EXCEL EXPORT ====== */
function exportExcel(sheets,filename='export.xlsx'){
  const wb=XLSX.utils.book_new();
  sheets.forEach(({name,data})=>{
    const ws=XLSX.utils.aoa_to_sheet(data);
    XLSX.utils.book_append_sheet(wb,ws,name);
  });
  XLSX.writeFile(wb,filename);
}

function exportCSV(rows,filename='export.csv'){
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=filename;a.click();
}

function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim());
  return result;
}
function importCSVFile(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    let text=e.target.result;
    // Remove BOM
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){cb([]);return;}
    const headers=parseCSVLine(lines[0]).map(h=>h.trim().replace(/^"|"$/g,''));
    const rows=lines.slice(1).map(l=>{
      const vals=parseCSVLine(l);
      const obj={};
      headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());
      return obj;
    }).filter(r=>Object.values(r).some(v=>v));
    cb(rows);
  };
  reader.readAsText(file,'UTF-8');
}

function LineBarChart({data,type='line',keys,colors,labels}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:type==='bar'?'bar':'line',
      data:{labels:data.map(d=>d.label||d.month),datasets:keys.map((k,i)=>({
        label:labels[i],data:data.map(d=>d[k]),
        borderColor:colors[i],backgroundColor:type==='bar'?colors[i]+'bb':colors[i]+'22',
        borderWidth:2,pointRadius:3,fill:type==='area',tension:.4,
        borderDash:i%2===1?[5,5]:undefined,
      }))},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11}}}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>fmtM(v)},grid:{color:'#f0f4f8'}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[JSON.stringify(data),type,JSON.stringify(keys)]);
  return <div className="chart-container"><canvas ref={ref}/></div>;
}

  const totals={
    rev_budget:filtered.reduce((s,m)=>s+m.rev_budget,0),rev_actual:filtered.reduce((s,m)=>s+m.rev_actual,0),
    exp_budget:filtered.reduce((s,m)=>s+m.exp_budget,0),exp_actual:filtered.reduce((s,m)=>s+m.exp_actual,0),
  };
  totals.profit_budget=totals.rev_budget-totals.exp_budget;
  totals.profit_actual=totals.rev_actual-totals.exp_actual;
  totals.rev_ach=totals.rev_budget>0?totals.rev_actual/totals.rev_budget*100:0;

  const loans=ls.get('loan_records',[]);
  const totalLoanOut=loans.filter(l=>l.txn_type==='draw').reduce((s,l)=>s+Number(l.amount),0);
  const totalLoanRepay=loans.filter(l=>l.txn_type==='repay').reduce((s,l)=>s+Number(l.amount),0);
  const totalLoanBalance=totalLoanOut-totalLoanRepay;

  const kpis={
    gpm:totals.rev_actual>0?(totals.profit_actual/totals.rev_actual*100).toFixed(1):'0.0',
    exp_ratio:totals.rev_actual>0?(totals.exp_actual/totals.rev_actual*100).toFixed(1):'0.0',
    bud_acc:totals.rev_budget>0?(100-Math.abs(totals.rev_actual-totals.rev_budget)/totals.rev_budget*100).toFixed(1):'0.0',
  };

  const years=Array.from({length:5},(_,i)=>(curYear-2+i).toString());

  return(
    <div style={{padding:24,maxWidth:1600,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:'#2e1065',margin:0}}>📊 Executive Dashboard</h1>
          <p style={{color:'#64748b',fontSize:13,marginTop:4}}>ภาพรวมงบประมาณและผลการดำเนินงาน</p>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select value={filterYear} onChange={e=>setFilterYear(e.target.value)} style={{fontSize:13,padding:'6px 10px',borderRadius:8,border:'1px solid #d1d5db'}}>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{fontSize:13,padding:'6px 10px',borderRadius:8,border:'1px solid #d1d5db'}}>
            <option value="">ทุกเดือน</option>
            {MONTHS_EN.map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
          </select>
          {(filterMonth||filterYear!==curYear.toString())&&<button onClick={()=>{setFilterMonth('');setFilterYear(curYear.toString());}} style={{fontSize:12,padding:'6px 10px',borderRadius:8,border:'1px solid #d1d5db',background:'#f3f4f6',cursor:'pointer'}}>🔄 รีเซ็ต</button>}
          <div style={{fontSize:12,color:'#94a3b8'}}>อัพเดท: {new Date().toLocaleString('th-TH')}</div>
        </div>
      </div>

      {/* KPI Row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:12,marginBottom:24}}>
        <KpiCard label="รายรับประมาณการ" value={`฿${fmtM(totals.rev_budget)}`} icon="🎯" borderColor="#7c3aed"/>
        <KpiCard label="รายรับจริง" value={`฿${fmtM(totals.rev_actual)}`} icon="💰" borderColor="#16a34a" trend={totals.rev_ach-100}/>
        <KpiCard label="รายจ่ายประมาณการ" value={`฿${fmtM(totals.exp_budget)}`} icon="📋" borderColor="#f59e0b"/>
        <KpiCard label="รายจ่ายจริง" value={`฿${fmtM(totals.exp_actual)}`} icon="💸" borderColor="#dc2626"/>
        <KpiCard label="กำไรสุทธิ" value={`฿${fmtM(totals.profit_actual)}`} icon="📈" borderColor="#a21caf"/>
        <KpiCard label="% บรรลุเป้า" value={fmtP(totals.rev_ach)} icon="🏆" borderColor="#f59e0b"/>
        <KpiCard label="ยอดคงค้างเงินกู้" value={`฿${fmtM(totalLoanBalance)}`} icon="🏦" borderColor="#0891b2" bg="#f0f9ff"/>
      </div>

      {/* Charts */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div className="card">
          <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>Revenue Trend — Budget vs Actual</h3>
          <LineBarChart data={filtered} type="line" keys={['rev_budget','rev_actual']} colors={['#c4b5fd','#7c3aed']} labels={['Budget','Actual']}/>
        </div>
        <div className="card">
          <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>Expense Trend — Budget vs Actual</h3>
          <LineBarChart data={filtered} type="line" keys={['exp_budget','exp_actual']} colors={['#fca5a5','#dc2626']} labels={['Budget','Actual']}/>
        </div>
        <div className="card">
          <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>Profit Trend</h3>
          <LineBarChart data={filtered} type="line" keys={['profit_budget','profit_actual']} colors={['#a78bfa','#0891b2']} labels={['Budget','Actual']}/>
        </div>
        <div className="card">
          <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>Budget vs Actual Monthly</h3>
          <LineBarChart data={filtered} type="bar" keys={['rev_budget','rev_actual']} colors={['#c4b5fd','#7c3aed']} labels={['Budget','Actual']}/>
        </div>
      </div>

      {/* KPI Indicators */}
      <div style={{marginBottom:24}}>
        <SectionTitle>🎯 KPI Indicators</SectionTitle>
        <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
          {[
            {label:'Gross Profit Margin',value:fmtP(kpis.gpm),good:parseFloat(kpis.gpm)>20,icon:'📈'},
            {label:'Expense Ratio',value:fmtP(kpis.exp_ratio),good:parseFloat(kpis.exp_ratio)<80,icon:'💸'},
            {label:'Revenue Growth',value:fmtP(kpis.rev_growth),good:true,icon:'📊'},
            {label:'Budget Accuracy',value:fmtP(kpis.bud_acc),good:parseFloat(kpis.bud_acc)>90,icon:'🎯'},
          ].map(k=>(
            <div key={k.label} className="kpi-card" style={{borderTop:`4px solid ${k.good?'#16a34a':'#f59e0b'}`,textAlign:'center'}}>
              <div style={{fontSize:22,marginBottom:6}}>{k.icon}</div>
              <div style={{fontSize:22,fontWeight:800,color:k.good?'#16a34a':'#d97706'}}>{k.value}</div>
              <div style={{fontSize:11,color:'#64748b',marginTop:4}}>{k.label}</div>
              <div style={{fontSize:11,fontWeight:600,color:k.good?'#16a34a':'#d97706',marginTop:6}}>{k.good?'✓ ดีกว่าเกณฑ์':'⚠ ควรปรับปรุง'}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Loan Summary */}
      {loans.length>0&&(
        <div style={{marginBottom:24}}>
          <SectionTitle>🏦 สรุปภาระเงินกู้ (Loan Summary)</SectionTitle>
          <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            {[
              {label:'เบิกกู้รวม',value:`฿${fmtM(totalLoanOut)}`,color:'#0891b2',bg:'#f0f9ff'},
              {label:'ชำระคืนรวม',value:`฿${fmtM(totalLoanRepay)}`,color:'#16a34a',bg:'#f0fdf4'},
              {label:'ยอดคงค้าง',value:`฿${fmtM(totalLoanBalance)}`,color:'#7c3aed',bg:'#faf5ff'},
              {label:'ดอกเบี้ยจ่ายรวม',value:`฿${fmtM(loans.filter(l=>l.txn_type==='interest').reduce((s,l)=>s+Number(l.amount),0))}`,color:'#dc2626',bg:'#fff1f2'},
            ].map(s=>(
              <div key={s.label} className="kpi-card" style={{background:s.bg,borderLeft:`4px solid ${s.color}`}}>
                <div style={{fontSize:11,color:'#64748b'}}>{s.label}</div>
                <div style={{fontSize:20,fontWeight:800,color:s.color,marginTop:4}}>{s.value}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function downloadSampleCSV(type){
  const rows=SAMPLE_CSV[type];
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  const names={revenue:'ตัวอย่าง_งบรายรับ',expense:'ตัวอย่าง_งบรายจ่าย',actual_revenue:'ตัวอย่าง_บันทึกผลจริง_รายรับ',actual_expense:'ตัวอย่าง_บันทึกผลจริง_รายจ่าย'};
  a.download=`${names[type]}.csv`;
  a.click();URL.revokeObjectURL(a.href);
}

/* ====== SHARED: ImportBar ====== */
function ImportBar({onImport,onExport,onClearAll,count,label,sampleType}){
  const [mode,setMode]=useState('append'); // append | replace
  return(
    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <div style={{display:'flex',gap:0,border:'1px solid #d1d5db',borderRadius:8,overflow:'hidden',flexShrink:0}}>
        {[['append','➕ เพิ่มเติม'],['replace','🔄 แทนที่ทั้งหมด']].map(([v,l])=>(
          <button key={v} type="button" onClick={()=>setMode(v)}
            style={{padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:mode===v?'#7c3aed':'#fff',color:mode===v?'#fff':'#374151'}}>
            {l}
          </button>
        ))}
      </div>
      <label className="btn btn-secondary" style={{cursor:'pointer',fontSize:13}}>
        📥 Import CSV
        <input type="file" accept=".csv" style={{display:'none'}} onChange={e=>{
          const file=e.target.files[0];if(!file)return;
          importCSVFile(file,rows=>onImport(rows,mode));e.target.value='';
        }}/>
      </label>
      {sampleType&&<button className="btn btn-secondary" style={{fontSize:13,background:'#f0fdf4',color:'#16a34a',border:'1px solid #86efac'}}
        onClick={()=>downloadSampleCSV(sampleType)}>
        📄 ดาวน์โหลด CSV ตัวอย่าง
      </button>}
      <button className="btn btn-secondary" style={{fontSize:13}} onClick={onExport}>📤 Export Excel</button>
      {count>0&&<button className="btn" style={{fontSize:13,background:'#fee2e2',color:'#991b1b',border:'1px solid #fca5a5'}}
        onClick={()=>{if(window.confirm(`ลบ${label}ทั้งหมด ${count} รายการ?`))onClearAll();}}>
        🗑 ลบทั้งหมด ({count})
      </button>}
    </div>
  );
}

/* ====== REVENUE BUDGET ====== */
function RevenueBudget(){
  const [budgets,setBudgets]=useState(()=>ls.get('rev_budgets',[]));
  const [form,setForm]=useState({dept:DEPARTMENTS[0],cat:REV_CATS[0],month:new Date().getMonth()+1,year:new Date().getFullYear(),amount:'',bank:'',notes:''});
  const [msg,setMsg]=useState('');
  const [selected,setSelected]=useState(new Set());
  const [filterCat,setFilterCat]=useState('');
  const [filterYear,setFilterYear]=useState(new Date().getFullYear().toString());

  function persist(nb){setBudgets(nb);ls.set('rev_budgets',nb);}
  function save(e){
    e.preventDefault();
    persist([...budgets,{id:Date.now(),...form,amount:+form.amount,status:'draft'}]);
    setMsg('✅ บันทึกสำเร็จ');setTimeout(()=>setMsg(''),3000);
    setForm(f=>({...f,amount:'',notes:'',bank:''}));
  }
  function del(id){persist(budgets.filter(b=>b.id!==id));}
  function delSelected(){
    if(!selected.size)return;
    if(window.confirm(`ลบ ${selected.size} รายการที่เลือก?`)){persist(budgets.filter(b=>!selected.has(b.id)));setSelected(new Set());}
  }
  function toggleSel(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleAll(){setSelected(s=>s.size===budgets.length?new Set():new Set(budgets.map(b=>b.id)));}

  function doExport(){
    exportExcel([{name:'Revenue Budget',data:[
      ['แผนก','ประเภทรายรับ','ธนาคาร/บัญชี','เดือน','ปี','จำนวนเงิน','หมายเหตุ','สถานะ'],
      ...budgets.map(b=>[b.dept,b.cat,b.bank||'',MONTHS_EN[b.month-1],b.year||'',b.amount,b.notes||'',b.status])
    ]}],'revenue_budget.xlsx');
  }
  function doImport(rows,mode){
    const parsed=rows.map((r,i)=>({
      id:Date.now()+i,
      dept:r['แผนก']||r.dept||DEPARTMENTS[0],
      cat:r['ประเภทรายรับ']||r['หมวด']||r.cat||REV_CATS[0],
      bank:r['ธนาคาร/บัญชี']||r['ธนาคาร']||r.bank||'',
      month:+r['เดือน']||+r.month||1,
      year:+r['ปี']||+r.year||new Date().getFullYear(),
      amount:+r['จำนวนเงิน']||+r.amount||0,
      notes:r['หมายเหตุ']||r.notes||'',
      status:'draft'
    }));
    const nb=mode==='replace'?parsed:[...budgets,...parsed];
    persist(nb);setMsg(`✅ ${mode==='replace'?'แทนที่':'เพิ่ม'} ${parsed.length} รายการ (รวม ${nb.length} รายการ)`);
  }

  const filtered=budgets.filter(b=>
    (!filterCat||b.cat===filterCat)&&
    String(b.year||new Date().getFullYear())===filterYear
  );
  const total=filtered.reduce((s,b)=>s+b.amount,0);

  // Summary by category (filtered year)
  const catSummary=filtered.reduce((acc,b)=>{acc[b.cat]=(acc[b.cat]||0)+b.amount;return acc;},{});

  return(
    <div style={{padding:24,maxWidth:1500,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:'#2e1065',margin:0}}>💰 งบประมาณรายรับ</h1>
          <p style={{color:'#64748b',fontSize:13,margin:0}}>ประมาณการรายรับ — ลูกหนี้ / เงินกู้ / ปันผล / อื่นๆ</p>
        </div>
        <ImportBar onImport={doImport} onExport={doExport} onClearAll={()=>persist([])} count={budgets.length} label="งบรายรับ" sampleType="revenue"/>
      </div>

      {/* CSV Format hint */}
      <div style={{background:'#faf5ff',border:'1px solid #e9d5ff',borderRadius:10,padding:'10px 16px',marginBottom:16,fontSize:12,color:'#4c1d95'}}>
        <strong>📋 รูปแบบ CSV Import:</strong> แผนก, ประเภทรายรับ, ธนาคาร/บัญชี, เดือน, ปี, จำนวนเงิน, หมายเหตุ
        <span style={{color:'#7c3aed',marginLeft:8}}>| ประเภทรายรับ: {REV_CATS.join(' / ')}</span>
      </div>

      <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
        <KpiCard label="งบรวมทั้งหมด" value={`฿${fmtM(total)}`} icon="💰" borderColor="#7c3aed"/>
        <KpiCard label="จำนวนรายการ" value={filtered.length} icon="📋" borderColor="#16a34a"/>
        <KpiCard label="เฉลี่ย/เดือน" value={`฿${fmtM(total/12)}`} icon="📅" borderColor="#f59e0b"/>
        <KpiCard label="ลูกหนี้ในประเทศ" value={`฿${fmtM(budgets.filter(b=>b.cat.startsWith('รับลูกหนี้ในประเทศ')).reduce((s,b)=>s+b.amount,0))}`} icon="🏢" borderColor="#0891b2"/>
      </div>

      {/* Category Summary */}
      {Object.keys(catSummary).length>0&&(
        <div className="card" style={{marginBottom:12,overflowX:'auto'}}>
          <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:10}}>สรุปตามประเภทรายรับ</h3>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {Object.entries(catSummary).map(([cat,sum])=>(
              <div key={cat} style={{background:'#f5f3ff',border:'1px solid #e9d5ff',borderRadius:8,padding:'8px 14px',minWidth:160}}>
                <div style={{fontSize:11,color:'#6b21a8',fontWeight:600,marginBottom:2}}>{cat}</div>
                <div style={{fontSize:15,fontWeight:800,color:'#7c3aed'}}>฿{fmtM(sum)}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="card" style={{marginBottom:12}}>
        <h2 style={{fontWeight:700,fontSize:15,marginBottom:12,color:'#4c1d95'}}>บันทึกงบประมาณรายรับ</h2>
        <form onSubmit={save} style={{display:'grid',gridTemplateColumns:'repeat(8,1fr) auto',gap:10,alignItems:'end'}}>
          <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>แผนก</label>
            <select value={form.dept} onChange={e=>setForm(f=>({...f,dept:e.target.value}))}>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</select></div>

function ExpenseBudget(){
  const [budgets,setBudgets]=useState(()=>ls.get('exp_budgets',[]));
  const [form,setForm]=useState({dept:DEPARTMENTS[2],cat:EXP_CATS[0],month:new Date().getMonth()+1,year:new Date().getFullYear(),amount:'',vendor:'',notes:''});
  const [msg,setMsg]=useState('');
  const [filterDept,setFilterDept]=useState('');
  const [filterCat,setFilterCat]=useState('');
  const [filterYear,setFilterYear]=useState(new Date().getFullYear().toString());
  const [selected,setSelected]=useState(new Set());

  function persist(nb){setBudgets(nb);ls.set('exp_budgets',nb);}
  function save(e){
    e.preventDefault();
    persist([...budgets,{id:Date.now(),...form,amount:+form.amount,status:'draft'}]);
    setMsg('✅ บันทึกสำเร็จ');setTimeout(()=>setMsg(''),3000);
    setForm(f=>({...f,amount:'',vendor:'',notes:''}));
  }
  function del(id){persist(budgets.filter(b=>b.id!==id));}
  function delSelected(){
    if(!selected.size)return;
    if(window.confirm(`ลบ ${selected.size} รายการที่เลือก?`)){persist(budgets.filter(b=>!selected.has(b.id)));setSelected(new Set());}
  }
  function toggleSel(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleAll(list){setSelected(s=>s.size===list.length&&list.length>0?new Set():new Set(list.map(b=>b.id)));}

  function doExport(){
    exportExcel([{name:'Expense Budget',data:[
      ['แผนก','ประเภทรายจ่าย','Vendor/เจ้าหนี้','เดือน','ปี','จำนวนเงิน','หมายเหตุ','สถานะ'],

    const parsed=rows.map((r,i)=>({
      id:Date.now()+i,

      cat:r['ประเภทรายจ่าย']||r['หมวด']||r.cat||EXP_CATS[0],
      vendor:r['Vendor/เจ้าหนี้']||r['Vendor']||r.vendor||'',

  }

  const filtered=budgets.filter(b=>
    (!filterDept||b.dept===filterDept)&&

  );

  // Summary by category (filtered year)
  const catSummary=filtered.reduce((acc,b)=>{acc[b.cat]=(acc[b.cat]||0)+b.amount;return acc;},{});

    <div style={{padding:24,maxWidth:1500,margin:'0 auto'}}>

        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:'#2e1065',margin:0}}>📋 งบประมาณรายจ่าย</h1>

      </div>

      {/* CSV Format hint */}
      <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,padding:'10px 16px',marginBottom:16,fontSize:12,color:'#92400e'}}>
        <strong>📋 รูปแบบ CSV Import:</strong> แผนก, ประเภทรายจ่าย, Vendor/เจ้าหนี้, เดือน, ปี, จำนวนเงิน, หมายเหตุ

        <KpiCard label="เงินเดือนพนักงาน" value={`฿${fmtM(budgets.filter(b=>b.cat==='เงินเดือนพนักงาน').reduce((s,b)=>s+b.amount,0))}`} icon="👥" borderColor="#0891b2"/>

      </div>

      {/* Category Summary */}
      {Object.keys(catSummary).length>0&&(

  }

  function doImportLoan(rows,mode){
    const parsed=rows.map((r,i)=>({
      id:Date.now()+i,
      bank:r['ธนาคาร']||r.bank||BANKS[0],
      loan_type:r['ประเภทวงเงิน']||r.loan_type||LOAN_TYPES[0],
      txn_type:r['ประเภทรายการ']||r.txn_type||'draw',
      date:r['วันที่']||r.date||today(),
      amount:+r['จำนวนเงิน']||+r.amount||0,
      interest_rate:+r['อัตราดอกเบี้ย%']||+r.interest_rate||0,
      due_date:r['วันครบกำหนด']||r.due_date||'',
      ref:r['เลขที่อ้างอิง']||r.ref||'',
      note:r['หมายเหตุ']||r.note||'',
    }));
    // Auto-link to actual_records
    const actRecs=ls.get('actual_records',[]);
    const autoEntries=parsed.map((r,i)=>({
      id:Date.now()+10000+i,source:'loan_auto',
      type:r.txn_type==='draw'?'revenue':'expense',
      cat:r.txn_type==='draw'?'รับเงินกู้':(r.txn_type==='repay'?'คืนเงินกู้':'ดอกเบี้ยเงินกู้'),
      dept:'Finance',date:r.date,amount:r.amount,ref:r.ref,
      desc:`${r.bank} — ${r.loan_type}`,vendor:r.bank,
    }));
    const baseAct=mode==='replace'?actRecs.filter(a=>a.source!=='loan_auto'):actRecs;
    ls.set('actual_records',[...baseAct,...autoEntries]);
    const nr=mode==='replace'?parsed:[...records,...parsed];
    setRecords(nr);ls.set('loan_records',nr);setMsg(`✅ ${mode==='replace'?'แทนที่':'เพิ่ม'} ${rows.length} รายการ (รวม ${nr.length} รายการ)`);
  }

  const filtered=records.filter(r=>(!filterBank||r.bank===filterBank)&&(!filterType||r.txn_type===filterType));

  // Summary by bank
  const bankSummary={};
  records.forEach(r=>{
    if(!bankSummary[r.bank])bankSummary[r.bank]={bank:r.bank,draw:0,repay:0,interest:0};
    if(r.txn_type==='draw')bankSummary[r.bank].draw+=+r.amount;
    else if(r.txn_type==='repay')bankSummary[r.bank].repay+=+r.amount;
    else if(r.txn_type==='interest')bankSummary[r.bank].interest+=+r.amount;
  });

  // Summary by loan_type (P/N vs Loan etc.)
  const typeSummary={};
  records.forEach(r=>{
    const lt=r.loan_type||'ไม่ระบุ';
    if(!typeSummary[lt])typeSummary[lt]={lt,draw:0,repay:0,interest:0};
    if(r.txn_type==='draw')typeSummary[lt].draw+=+r.amount;
    else if(r.txn_type==='repay')typeSummary[lt].repay+=+r.amount;
    else if(r.txn_type==='interest')typeSummary[lt].interest+=+r.amount;
  });

  // Summary by loan_type x bank (cross table)
  const crossKey=(lt,bk)=>lt+'|||'+bk;
  const crossSummary={};
  records.forEach(r=>{
    const lt=r.loan_type||'ไม่ระบุ';
    const k=crossKey(lt,r.bank);
    if(!crossSummary[k])crossSummary[k]={lt,bank:r.bank,draw:0,repay:0,interest:0};
    if(r.txn_type==='draw')crossSummary[k].draw+=+r.amount;
    else if(r.txn_type==='repay')crossSummary[k].repay+=+r.amount;
    else if(r.txn_type==='interest')crossSummary[k].interest+=+r.amount;
  });
  const loanTypes=Object.keys(typeSummary);

  const totalDraw=records.filter(r=>r.txn_type==='draw').reduce((s,r)=>s+r.amount,0);
  const totalRepay=records.filter(r=>r.txn_type==='repay').reduce((s,r)=>s+r.amount,0);
  const totalInterest=records.filter(r=>r.txn_type==='interest').reduce((s,r)=>s+r.amount,0);
  const totalBalance=totalDraw-totalRepay;

  return(
    <div style={{padding:24,maxWidth:1400,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:'#2e1065',margin:0}}>🏦 บริหารเงินกู้ & เสริมสภาพคล่อง</h1>
          <p style={{color:'#64748b',fontSize:13,marginTop:4}}>P/N, Loan, OD — บันทึกการกู้, ชำระคืน, ดอกเบี้ย</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <ImportBar onImport={doImportLoan} onExport={doExport} onClearAll={()=>{setRecords([]);ls.set('loan_records',[]);}} count={records.length} label="เงินกู้"/>
          <button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ บันทึกรายการ</button>
        </div>
      </div>

      {/* Summary KPIs */}
      <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        <KpiCard label="เบิกกู้รวม" value={`฿${fmtM(totalDraw)}`} icon="💳" borderColor="#0891b2" bg="#f0f9ff"/>
        <KpiCard label="ชำระคืนรวม" value={`฿${fmtM(totalRepay)}`} icon="💚" borderColor="#16a34a" bg="#f0fdf4"/>
        <KpiCard label="ยอดคงค้าง" value={`฿${fmtM(totalBalance)}`} icon="🏦" borderColor="#7c3aed" bg="#faf5ff"/>
        <KpiCard label="ดอกเบี้ยจ่ายรวม" value={`฿${fmtM(totalInterest)}`} icon="📊" borderColor="#dc2626" bg="#fff1f2"/>
      </div>

      {/* Bank Summary */}
      {Object.keys(bankSummary).length>0&&(
        <div className="card" style={{marginBottom:16,overflowX:'auto'}}>
          <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>สรุปตามธนาคาร</h3>
          <table>
            <thead><tr><th>ธนาคาร</th><th style={{textAlign:'right'}}>เบิกกู้</th><th style={{textAlign:'right'}}>ชำระคืน</th><th style={{textAlign:'right'}}>ดอกเบี้ยจ่าย</th><th style={{textAlign:'right'}}>ยอดคงค้าง</th></tr></thead>
            <tbody>{Object.values(bankSummary).map(b=>(
              <tr key={b.bank}>
                <td style={{fontWeight:600}}>{b.bank}</td>
                <td style={{textAlign:'right',color:'#0891b2',fontWeight:600}}>฿{fmt(b.draw)}</td>
                <td style={{textAlign:'right',color:'#16a34a',fontWeight:600}}>฿{fmt(b.repay)}</td>
                <td style={{textAlign:'right',color:'#dc2626',fontWeight:600}}>฿{fmt(b.interest)}</td>
                <td style={{textAlign:'right',color:'#7c3aed',fontWeight:700}}>฿{fmt(b.draw-b.repay)}</td>
              </tr>
            ))}</tbody>
            <tfoot><tr>
              <td>รวม</td>
              <td style={{textAlign:'right',color:'#0891b2'}}>฿{fmt(totalDraw)}</td>
              <td style={{textAlign:'right',color:'#16a34a'}}>฿{fmt(totalRepay)}</td>
              <td style={{textAlign:'right',color:'#dc2626'}}>฿{fmt(totalInterest)}</td>
              <td style={{textAlign:'right',color:'#7c3aed'}}>฿{fmt(totalBalance)}</td>
            </tr></tfoot>
          </table>
        </div>
      )}

      {/* Type Summary */}
      {loanTypes.length>0&&(
        <div className="resp-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          {/* สรุปตามประเภทวงเงิน */}
          <div className="card" style={{overflowX:'auto'}}>
            <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>📋 สรุปตามประเภทวงเงิน (P/N vs Loan)</h3>
            <table>
              <thead><tr>
                <th>ประเภทวงเงิน</th>
                <th style={{textAlign:'right',color:'#0891b2'}}>เบิกกู้</th>
                <th style={{textAlign:'right',color:'#16a34a'}}>ชำระคืน</th>
                <th style={{textAlign:'right',color:'#dc2626'}}>ดอกเบี้ย</th>
                <th style={{textAlign:'right',color:'#7c3aed',fontWeight:800}}>คงค้าง</th>
              </tr></thead>
              <tbody>
                {loanTypes.map(lt=>{
                  const t=typeSummary[lt];
                  const bal=t.draw-t.repay;
                  const isPn=lt.includes('P/N');
                  return(
                    <tr key={lt}>
                      <td>
                        <span style={{display:'inline-block',padding:'2px 8px',borderRadius:6,fontSize:12,fontWeight:700,
                          background:isPn?'#e0f2fe':'#fef9c3',color:isPn?'#0369a1':'#854d0e'}}>
                          {isPn?'📄 P/N':'🏦 Loan'}
                        </span>
                        <span style={{fontSize:12,color:'#64748b',marginLeft:6}}>{lt}</span>
                      </td>
                      <td style={{textAlign:'right',color:'#0891b2',fontWeight:600}}>฿{fmt(t.draw)}</td>
                      <td style={{textAlign:'right',color:'#16a34a',fontWeight:600}}>฿{fmt(t.repay)}</td>
                      <td style={{textAlign:'right',color:'#dc2626',fontWeight:600}}>฿{fmt(t.interest)}</td>
                      <td style={{textAlign:'right',color:bal>0?'#7c3aed':'#16a34a',fontWeight:800,fontSize:14}}>฿{fmt(bal)}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot><tr>
                <td style={{fontWeight:700}}>รวมทั้งหมด</td>
                <td style={{textAlign:'right',color:'#0891b2',fontWeight:700}}>฿{fmt(totalDraw)}</td>
                <td style={{textAlign:'right',color:'#16a34a',fontWeight:700}}>฿{fmt(totalRepay)}</td>
                <td style={{textAlign:'right',color:'#dc2626',fontWeight:700}}>฿{fmt(totalInterest)}</td>
                <td style={{textAlign:'right',color:'#7c3aed',fontWeight:800}}>฿{fmt(totalBalance)}</td>
              </tr></tfoot>
            </table>
          </div>

          {/* สรุป P/N x ธนาคาร */}
          <div className="card" style={{overflowX:'auto'}}>
            <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>🔀 สรุปแยก ประเภท × ธนาคาร</h3>
            <table>
              <thead><tr>
                <th>ประเภท</th>
                <th>ธนาคาร</th>
                <th style={{textAlign:'right',color:'#0891b2'}}>เบิกกู้</th>
                <th style={{textAlign:'right',color:'#16a34a'}}>ชำระคืน</th>
                <th style={{textAlign:'right',color:'#7c3aed',fontWeight:800}}>คงค้าง</th>
              </tr></thead>
              <tbody>
                {loanTypes.map(lt=>{
                  const rows=Object.values(crossSummary).filter(c=>c.lt===lt);
                  const isPn=lt.includes('P/N');
                  return rows.map((c,idx)=>(
                    <tr key={lt+c.bank}>
                      {idx===0&&<td rowSpan={rows.length} style={{verticalAlign:'top',paddingTop:10}}>
                        <span style={{display:'inline-block',padding:'2px 8px',borderRadius:6,fontSize:11,fontWeight:700,
                          background:isPn?'#e0f2fe':'#fef9c3',color:isPn?'#0369a1':'#854d0e'}}>
                          {isPn?'📄 P/N':'🏦 Loan'}
                        </span>
                      </td>}
                      <td style={{fontSize:13}}>{c.bank}</td>
                      <td style={{textAlign:'right',color:'#0891b2',fontSize:13}}>฿{fmt(c.draw)}</td>
                      <td style={{textAlign:'right',color:'#16a34a',fontSize:13}}>฿{fmt(c.repay)}</td>
                      <td style={{textAlign:'right',color:c.draw-c.repay>0?'#7c3aed':'#16a34a',fontWeight:700}}>฿{fmt(c.draw-c.repay)}</td>
                    </tr>
                  ));
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Filter */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <select value={filterBank} onChange={e=>setFilterBank(e.target.value)} style={{width:200}}>
          <option value="">ทุกธนาคาร</option>{BANKS.map(b=><option key={b}>{b}</option>)}
        </select>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{width:180}}>
          <option value="">ทุกประเภท</option>
          <option value="draw">เบิกกู้เงิน</option>
          <option value="repay">ชำระคืน</option>
          <option value="interest">ดอกเบี้ย</option>
        </select>
      </div>

      {/* Records Table */}
      <div className="card" style={{overflowX:'auto'}}>
        <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>รายการทั้งหมด ({filtered.length})</h3>
        {msg&&<div style={{marginBottom:10,fontSize:13}}>{msg}</div>}
        <table>
          <thead><tr>
            <th>วันที่</th><th>ธนาคาร</th><th>ประเภทวงเงิน</th><th>รายการ</th>
            <th style={{textAlign:'right'}}>จำนวนเงิน</th><th style={{textAlign:'right'}}>อัตราดอกเบี้ย</th>
            <th>วันครบกำหนด</th><th>เลขที่อ้างอิง</th><th>หมายเหตุ</th><th>ลบ</th>
          </tr></thead>
          <tbody>{filtered.length===0?<tr><td colSpan={10} style={{textAlign:'center',padding:32,color:'#94a3b8'}}>ไม่มีข้อมูล</td></tr>:
            filtered.map(r=>{
              const t=TXN_TYPES.find(x=>x.v===r.txn_type)||TXN_TYPES[0];
              return<tr key={r.id}>
                <td>{r.date}</td>
                <td style={{fontWeight:600}}>{r.bank}</td>
                <td style={{fontSize:11}}>{r.loan_type}</td>
                <td><span className="badge" style={{background:t.bg,color:t.color}}>{t.label}</span></td>
                <td style={{textAlign:'right',fontWeight:700,color:t.color}}>฿{fmt(r.amount)}</td>
                <td style={{textAlign:'right'}}>{r.interest_rate?r.interest_rate+'%':'-'}</td>
                <td style={{color:r.due_date&&new Date(r.due_date)<new Date()?'#dc2626':'inherit'}}>{r.due_date||'-'}</td>
                <td style={{color:'#64748b',fontSize:12}}>{r.ref||'-'}</td>
                <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{r.note||'-'}</td>
                <td><button onClick={()=>delRecord(r.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:16}}>🗑</button></td>
              </tr>;
            })
          }</tbody>
        </table>
      </div>

      {/* Form Modal */}
      {showForm&&(
        <Modal title="บันทึกรายการเงินกู้" onClose={()=>setShowForm(false)} width={560}>
          <form onSubmit={save}>
            {/* Transaction Type Selector */}
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:8}}>ประเภทรายการ</label>
              <div style={{display:'flex',gap:8}}>
                {TXN_TYPES.map(t=>(
                  <button key={t.v} type="button" onClick={()=>setForm(f=>({...f,txn_type:t.v}))}
                    style={{flex:1,padding:'10px 8px',borderRadius:8,border:`2px solid ${form.txn_type===t.v?t.color:'#e5e7eb'}`,background:form.txn_type===t.v?t.bg:'#fff',color:form.txn_type===t.v?t.color:'#374151',fontWeight:600,fontSize:12,cursor:'pointer'}}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>ธนาคาร</label>
                <select value={form.bank} onChange={e=>setForm(f=>({...f,bank:e.target.value}))}>
                  {BANKS.map((b,i)=><option key={b} value={b}>{i+1}. {b}</option>)}
                </select></div>
              <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>ประเภทวงเงิน</label>
                <select value={form.loan_type} onChange={e=>setForm(f=>({...f,loan_type:e.target.value}))}>
                  {LOAN_TYPES.map(t=><option key={t}>{t}</option>)}
                </select></div>
              <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>วันที่</label>
                <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} required/></div>
              <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>จำนวนเงิน (บาท)</label>
                <input type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} required/></div>
              {form.txn_type==='draw'&&<>
                <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>อัตราดอกเบี้ย (%/ปี)</label>
                  <input type="number" step="0.01" placeholder="6.00" value={form.interest_rate} onChange={e=>setForm(f=>({...f,interest_rate:e.target.value}))}/></div>
                <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>วันครบกำหนด</label>
                  <input type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))}/></div>
              </>}
              <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>เลขที่อ้างอิง</label>
                <input placeholder="PN-2025-001" value={form.ref} onChange={e=>setForm(f=>({...f,ref:e.target.value}))}/></div>
              <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>หมายเหตุ</label>
                <input placeholder="หมายเหตุ" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            </div>
            {form.txn_type==='draw'&&form.amount&&form.interest_rate&&(
              <div style={{background:'#f5f3ff',border:'1px solid #c4b5fd',borderRadius:8,padding:12,marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:600,color:'#4c1d95',marginBottom:4}}>💡 คำนวณดอกเบี้ยประมาณการ</div>
                <div>ดอกเบี้ยต่อเดือน: <strong>฿{fmt(form.amount*form.interest_rate/100/12)}</strong></div>
                <div>ดอกเบี้ยต่อปี: <strong>฿{fmt(form.amount*form.interest_rate/100)}</strong></div>
              </div>
            )}
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button type="button" className="btn btn-secondary" onClick={()=>setShowForm(false)}>ยกเลิก</button>
              <button type="submit" className="btn btn-primary">บันทึก</button>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

/* ====== ACTUAL ENTRY ====== */
function ActualEntry(){
  const curUser=React.useContext(UserCtx);
  const [tab,setTab]=useState('revenue');
  // Admin/Finance เห็นทั้งหมด, คนอื่นเห็นแค่ของตัวเอง
  const [records,setRecords]=useState(()=>filterOwn(ls.get('actual_records',[]),curUser));
  const [form,setForm]=useState({dept:DEPARTMENTS[0],cat:REV_CATS[0],date:'',amount:'',ref:'',desc:'',vendor:''});
  const [msg,setMsg]=useState('');
  const [filterMonth,setFilterMonth]=useState('');
  const [selected,setSelected]=useState(new Set());

  useEffect(()=>{setForm(f=>({...f,cat:(tab==='revenue'?REV_CATS:EXP_CATS)[0]}));setSelected(new Set());},[tab]);

  // persist: admin saves all, user saves only own records merged with others
  function persist(nr){
    if(canSeeAll(curUser)){
      setRecords(nr);ls.set('actual_records',nr);
    }else{
      const all=ls.get('actual_records',[]);
      const others=all.filter(r=>r.created_by&&r.created_by!==curUser.username);
      ls.set('actual_records',[...others,...nr]);
      setRecords(nr);
    }
  }
  function save(e){
    e.preventDefault();
    persist([...records,{id:Date.now(),type:tab,...form,amount:+form.amount,created_by:curUser.username}]);
    setMsg('✅ บันทึกสำเร็จ');setForm(f=>({...f,amount:'',ref:'',desc:'',vendor:''}));
    setTimeout(()=>setMsg(''),3000);
  }
  function del(id){persist(records.filter(r=>r.id!==id));}
  function delSelected(){
    if(!selected.size)return;
    if(window.confirm(`ลบ ${selected.size} รายการที่เลือก?`)){persist(records.filter(r=>!selected.has(r.id)));setSelected(new Set());}
  }
  function toggleSel(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleAll(list){setSelected(s=>s.size===list.length&&list.length>0?new Set():new Set(list.map(r=>r.id)));}

  function doExport(){
    const cols=['วันที่','แผนก',tab==='revenue'?'ประเภทรายรับ':'ประเภทรายจ่าย','Vendor/เจ้าหนี้','รายละเอียด','จำนวนเงิน','แหล่งข้อมูล'];
    const rows=records.filter(r=>r.type===tab).map(r=>[r.date,r.dept,r.cat,r.vendor||'',r.desc||'',r.amount,r.source==='loan_auto'?'เงินกู้':'บันทึกจริง']);
    exportExcel([{name:`Actual_${tab==='revenue'?'Revenue':'Expense'}`,data:[cols,...rows]}],`actual_${tab}.xlsx`);
  }
  function doImport(rows,mode){
    const parsed=rows.map((r,i)=>({
      id:Date.now()+i,
      type:tab,
      source:'manual',
      created_by:curUser.username,
      dept:r['แผนก']||r.dept||DEPARTMENTS[0],
      cat:r['ประเภทรายรับ']||r['ประเภทรายจ่าย']||r['หมวด']||r.cat||(tab==='revenue'?REV_CATS[0]:EXP_CATS[0]),
      date:r['วันที่']||r.date||today(),
      amount:+r['จำนวนเงิน']||+r.amount||0,
      ref:r['อ้างอิง']||r['เลขที่']||r.ref||'',
      desc:r['รายละเอียด']||r.desc||'',
      vendor:r['Vendor/เจ้าหนี้']||r['Vendor']||r.vendor||'',
      bank:r['ธนาคาร']||r.bank||'',
    }));
    const base=mode==='replace'?records.filter(r=>r.type!==tab||r.source==='loan_auto'):records;
    const nr=[...base,...parsed];
    persist(nr);setMsg(`✅ ${mode==='replace'?'แทนที่':'เพิ่ม'} ${parsed.length} รายการ (${tab==='revenue'?'รายรับ':'รายจ่าย'} รวม ${nr.filter(r=>r.type===tab).length} รายการ)`);
  }

  const filtered=records.filter(r=>r.type===tab&&(!filterMonth||new Date(r.date).getMonth()+1===+filterMonth));
  const total=filtered.reduce((s,r)=>s+r.amount,0);
  const tabCats=tab==='revenue'?REV_CATS:EXP_CATS;

  // Category summary
  const catSum=filtered.reduce((acc,r)=>{acc[r.cat]=(acc[r.cat]||0)+r.amount;return acc;},{});

  return(
    <div style={{padding:24,maxWidth:1500,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:'#2e1065',margin:0}}>✏️ บันทึกผลจริง</h1>
          <p style={{color:'#64748b',fontSize:13,margin:0}}>บันทึกรายรับ/รายจ่ายจริง — เชื่อมโยงไปยัง Cash Flow อัตโนมัติ</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{width:120}}>
            <option value="">ทุกเดือน</option>{MONTHS_TH.map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
          </select>
          <ImportBar onImport={doImport} onExport={doExport} onClearAll={()=>persist(records.filter(r=>r.type!==tab||r.source==='loan_auto'))} count={records.filter(r=>r.type===tab&&r.source!=='loan_auto').length} label={`ผลจริง${tab==='revenue'?'รายรับ':'รายจ่าย'}`} sampleType={tab==='revenue'?'actual_revenue':'actual_expense'}/>
        </div>
      </div>

      {/* Tab */}
      <div style={{display:'flex',gap:4,background:'#f5f3ff',padding:4,borderRadius:12,width:'fit-content',marginBottom:16}}>
        {[['revenue','💰 รายรับ'],['expense','💸 รายจ่าย']].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:'8px 20px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:tab===t?'#fff':'transparent',color:tab===t?'#7c3aed':'#6b7280',boxShadow:tab===t?'0 1px 3px rgba(0,0,0,.1)':'none'}}>
            {l}
          </button>
        ))}
      </div>

      {/* CSV Format hint */}
      <div style={{background:'#faf5ff',border:'1px solid #e9d5ff',borderRadius:10,padding:'10px 16px',marginBottom:12,fontSize:12,color:'#4c1d95'}}>
        <strong>📋 CSV Import:</strong> วันที่(YYYY-MM-DD), แผนก, {tab==='revenue'?'ประเภทรายรับ':'ประเภทรายจ่าย'}, จำนวนเงิน, อ้างอิง, รายละเอียด{tab==='expense'?', Vendor/เจ้าหนี้, ธนาคาร':''}
        {msg&&<div style={{marginTop:6,fontWeight:600,color:'#16a34a'}}>{msg}</div>}
      </div>

      <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:12}}>
        <KpiCard label="รายการทั้งหมด" value={records.filter(r=>r.type===tab).length} icon="📄" borderColor="#7c3aed"/>
        <KpiCard label="รายการที่กรอง" value={filtered.length} icon="🔍" borderColor="#0891b2"/>
        <KpiCard label="ยอดรวม" value={`฿${fmt(total)}`} icon={tab==='revenue'?'💰':'💸'} borderColor={tab==='revenue'?'#16a34a':'#dc2626'}/>
        <KpiCard label="Auto-link จากเงินกู้" value={records.filter(r=>r.type===tab&&r.source==='loan_auto').length} icon="🔗" borderColor="#f59e0b"/>
      </div>

      {/* Category Summary */}
      {Object.keys(catSum).length>0&&(
        <div className="card" style={{marginBottom:12,padding:'12px 16px'}}>
          <h3 style={{fontWeight:700,fontSize:13,color:'#4c1d95',marginBottom:8}}>สรุปตามประเภท</h3>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {Object.entries(catSum).map(([cat,sum])=>(
              <div key={cat} style={{background:tab==='revenue'?'#f0fdf4':'#fffbeb',border:`1px solid ${tab==='revenue'?'#bbf7d0':'#fde68a'}`,borderRadius:8,padding:'6px 12px',minWidth:120}}>
                <div style={{fontSize:11,color:tab==='revenue'?'#166534':'#92400e',fontWeight:600}}>{cat}</div>
                <div style={{fontSize:14,fontWeight:800,color:tab==='revenue'?'#16a34a':'#d97706'}}>฿{fmtM(sum)}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Form */}
      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontWeight:700,fontSize:14,color:'#4c1d95',marginBottom:12}}>บันทึกรายการ{tab==='revenue'?'รายรับ':'รายจ่าย'}จริง</h3>
        <form onSubmit={save} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr) auto',gap:10,alignItems:'end'}}>
          <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>วันที่ *</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} required/></div>
          <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>แผนก</label><select value={form.dept} onChange={e=>setForm(f=>({...f,dept:e.target.value}))}>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</select></div>
          <div style={{gridColumn:'span 2'}}><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>{tab==='revenue'?'ประเภทรายรับ':'ประเภทรายจ่าย'}</label>
            <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>{tabCats.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>จำนวนเงิน *</label><input type="number" min="0" step="0.01" placeholder="0.00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} required/></div>
          <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>{tab==='expense'?'Vendor/เจ้าหนี้':'ธนาคาร/แหล่ง'}</label><input placeholder={tab==='expense'?'ชื่อเจ้าหนี้':'ชื่อลูกหนี้/แหล่งเงิน'} value={form.vendor} onChange={e=>setForm(f=>({...f,vendor:e.target.value}))}/></div>
          <div><label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:6}}>รายละเอียด/เลขที่</label><input placeholder="เลขที่เอกสาร/รายละเอียด" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/></div>
          <button type="submit" className="btn btn-primary" style={{whiteSpace:'nowrap'}}>+ บันทึก</button>
        </form>
      </div>

      {/* Table */}
      <div className="card" style={{overflowX:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontSize:13,color:'#64748b'}}>{filtered.length} รายการ
            {filtered.filter(r=>r.source==='loan_auto').length>0&&
              <span style={{marginLeft:8,fontSize:11,background:'#fef9c3',color:'#92400e',padding:'2px 8px',borderRadius:4}}>🔗 {filtered.filter(r=>r.source==='loan_auto').length} Auto จากเงินกู้</span>}
          </span>
          {selected.size>0&&<button className="btn" style={{fontSize:12,background:'#fee2e2',color:'#991b1b',border:'1px solid #fca5a5'}} onClick={delSelected}>🗑 ลบที่เลือก ({selected.size})</button>}
        </div>
        <table>
          <thead><tr>
            <th style={{width:36}}><input type="checkbox" checked={selected.size===filtered.length&&filtered.length>0} onChange={()=>toggleAll(filtered)}/></th>
            <th>วันที่</th><th>แผนก</th><th>ประเภท</th><th>Vendor/แหล่งเงิน</th><th>รายละเอียด</th><th style={{textAlign:'right'}}>จำนวนเงิน</th><th>แหล่ง</th>
            {canSeeAll(curUser)&&<th>ผู้บันทึก</th>}
            <th style={{width:40}}>ลบ</th>
          </tr></thead>
          <tbody>{filtered.length===0?<tr><td colSpan={canSeeAll(curUser)?10:9} style={{textAlign:'center',padding:32,color:'#94a3b8'}}>ยังไม่มีข้อมูล</td></tr>:
            filtered.map(r=>(
              <tr key={r.id} style={{background:r.source==='loan_auto'?'#fffbeb':selected.has(r.id)?'#faf5ff':''}}>
                <td><input type="checkbox" checked={selected.has(r.id)} onChange={()=>toggleSel(r.id)}/></td>
                <td style={{fontWeight:600,fontSize:12}}>{r.date}</td>
                <td style={{fontWeight:600,fontSize:12}}>{r.dept}</td>
                <td><span style={{fontSize:11,fontWeight:600,color:tab==='revenue'?'#6b21a8':'#92400e',background:tab==='revenue'?'#f3e8ff':'#fffbeb',padding:'2px 8px',borderRadius:4}}>{r.cat}</span></td>
                <td style={{fontSize:12,color:'#64748b',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.vendor||'-'}</td>
                <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{r.desc||r.ref||'-'}</td>
                <td style={{textAlign:'right',fontWeight:700,color:tab==='revenue'?'#16a34a':'#dc2626'}}>฿{fmt(r.amount)}</td>
                <td><span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:r.source==='loan_auto'?'#fef9c3':'#f1f5f9',color:r.source==='loan_auto'?'#92400e':'#64748b'}}>{r.source==='loan_auto'?'🔗เงินกู้':'✏️บันทึก'}</span></td>
                {canSeeAll(curUser)&&<td style={{fontSize:11,color:'#64748b'}}>{r.created_by?('👤 '+r.created_by):'—'}</td>}
                <td><button onClick={()=>{if(window.confirm('ลบรายการนี้?'))del(r.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:16}}>🗑</button></td>
              </tr>
            ))
          }</tbody>
          {filtered.length>0&&<tfoot><tr><td/><td colSpan={5}>รวม</td><td style={{textAlign:'right',color:tab==='revenue'?'#16a34a':'#dc2626'}}>฿{fmt(total)}</td><td/><td/></tr></tfoot>}
        </table>
      </div>
    </div>
  );
}

/* ====== DAILY CASH FLOW ====== */
function DailyCashFlow(){
  const [dailyPlan,setDailyPlan]=useState(()=>ls.get('daily_cashflow',[]));
  // ยอดยกมาเริ่มต้น (ต้นปี/ต้นงวด) — ผู้ใช้กำหนดได้
  const [openingYear,setOpeningYear]=useState(()=>ls.get('cf_opening_year',0));
  const [editOpening,setEditOpening]=useState(false);
  const [openingInput,setOpeningInput]=useState('');
  const [form,setForm]=useState({date:today(),type:'inflow',category:'รายรับลูกค้า',amount:'',bank:BANKS[0],desc:'',ref:''});
  const [viewTab,setViewTab]=useState('daily'); // daily | monthly | yearly | budget
  const [filterMonth,setFilterMonth]=useState('');
  const [filterYear,setFilterYear]=useState(new Date().getFullYear().toString());
  // Budget cashflow state
  const [cfBudgets,setCfBudgets]=useState(()=>ls.get('cf_budgets',[]));
  const [budForm,setBudForm]=useState({date:today(),flow:'in',category:'รายรับลูกค้า',amount:'',bank:BANKS[0],desc:''});
  const [budMsg,setBudMsg]=useState('');
  // Budget CF: opening balance per month (key: 'YYYY-MM' → amount)
  const [cfMonthOpen,setCfMonthOpen]=useState(()=>ls.get('cf_month_open',{}));
  const [editOpenMonth,setEditOpenMonth]=useState(null); // 'YYYY-MM' ที่กำลังแก้
  const [openInput,setOpenInput]=useState('');
  const [budExpandDate,setBudExpandDate]=useState(null);
  const [budViewTab,setBudViewTab]=useState('daily'); // daily | monthly
  const [msg,setMsg]=useState('');
  const [expandDate,setExpandDate]=useState(null);

  const DAILY_CATS={
    inflow:[...REV_CATS,'โอนรับจากบัญชีอื่น'],
    outflow:[...EXP_CATS,'จ่ายดอกเบี้ย','โอนจ่ายซัพพลายเออร์'],
  };

  function saveOpening(){
    const v=parseFloat(openingInput)||0;
    setOpeningYear(v);ls.set('cf_opening_year',v);
    setEditOpening(false);setMsg('✅ บันทึกยอดยกมาสำเร็จ');setTimeout(()=>setMsg(''),3000);
  }

  function save(e){
    e.preventDefault();
    const nr=[...dailyPlan,{id:Date.now(),...form,amount:+form.amount}];
    setDailyPlan(nr);ls.set('daily_cashflow',nr);
    setMsg('✅ บันทึกสำเร็จ');setForm(f=>({...f,amount:'',ref:'',desc:''}));
    setTimeout(()=>setMsg(''),3000);
  }

  function del(id){const nr=dailyPlan.filter(r=>r.id!==id);setDailyPlan(nr);ls.set('daily_cashflow',nr);}

  // Budget CF save/delete/export/import
  function saveBudget(e){
    e.preventDefault();
    const nr=[...cfBudgets,{id:Date.now(),...budForm,amount:+budForm.amount}];
    setCfBudgets(nr);ls.set('cf_budgets',nr);
    setBudMsg('✅ บันทึก Budget Cashflow สำเร็จ');
    setBudForm(f=>({...f,amount:'',desc:''}));
    setTimeout(()=>setBudMsg(''),3000);
  }
  function delBudget(id){const nr=cfBudgets.filter(r=>r.id!==id);setCfBudgets(nr);ls.set('cf_budgets',nr);}
  function exportBudgetCF(){
    const rows=[['วันที่','ประเภท','หมวด','ธนาคาร','จำนวนเงิน','รายละเอียด'],
      ...cfBudgets.map(r=>[r.date,r.flow==='in'?'รับ':'จ่าย',r.category,r.bank||'',r.amount,r.desc||''])];
    exportExcel([{name:'Budget CF',data:rows}],'budget_cf.xlsx');
  }
  function importBudgetCF(rows,mode){
    const parsed=rows.map((r,i)=>({
      id:Date.now()+i,
      date:r['วันที่']||r.date||today(),
      flow:(r['ประเภท']||r.flow||'in')==='รับ'?'in':'out',
      category:r['หมวด']||r.category||REV_CATS[0],
      bank:r['ธนาคาร']||r.bank||BANKS[0],
      amount:+r['จำนวนเงิน']||+r.amount||0,
      desc:r['รายละเอียด']||r.desc||'',
    }));
    const nr=mode==='replace'?parsed:[...cfBudgets,...parsed];
    setCfBudgets(nr);ls.set('cf_budgets',nr);
    setBudMsg('✅ '+(mode==='replace'?'แทนที่':'เพิ่ม')+' '+parsed.length+' รายการ');
  }

  // Budget monthly summary
  const cfBudgetFiltered=cfBudgets.filter(r=>r.date?.startsWith(filterYear));

  // Build daily rows for Budget CF with running balance per month
  function saveCfMonthOpen(mk,val){
    const updated={...cfMonthOpen,[mk]:val};
    setCfMonthOpen(updated);ls.set('cf_month_open',updated);
  }
  // Group by date
  const cfBudByDate={};
  cfBudgetFiltered.forEach(r=>{
    if(!cfBudByDate[r.date])cfBudByDate[r.date]={date:r.date,inflow:0,outflow:0,items:[]};
    if(r.flow==='in')cfBudByDate[r.date].inflow+=r.amount;
    else cfBudByDate[r.date].outflow+=r.amount;
    cfBudByDate[r.date].items.push(r);
  });
  // Group by month, build daily rows with opening from cfMonthOpen
  const cfBudgetByMonth={};
  Object.values(cfBudByDate).sort((a,b)=>a.date.localeCompare(b.date)).forEach(d=>{
    const mk=d.date.slice(0,7);
    if(!cfBudgetByMonth[mk])cfBudgetByMonth[mk]={month:mk,inflow:0,outflow:0,items:[],days:[]};
    cfBudgetByMonth[mk].inflow+=d.inflow;
    cfBudgetByMonth[mk].outflow+=d.outflow;
    cfBudgetByMonth[mk].days.push(d);
  });
  // Compute daily running balance per month using cfMonthOpen
  const cfBudgetMonthsRaw=Object.values(cfBudgetByMonth).sort((a,b)=>a.month.localeCompare(b.month));
  const cfBudgetMonths=cfBudgetMonthsRaw.map(m=>{
    const opening=cfMonthOpen[m.month]||0;
    let run=opening;
    const daysWithBal=m.days.map(d=>{
      const openBal=run;
      const net=d.inflow-d.outflow;
      run+=net;
      return{...d,openBal,net,closeBal:run};
    });
    return{...m,opening,daysWithBal,closeBal:run,net:m.inflow-m.outflow,items:m.days.flatMap(d=>d.items)};
  });

  // ---- Daily cashflow: ใช้เฉพาะ manual entries เท่านั้น (ไม่ดึงจากบันทึกผลจริง) ----
  const manualCF=dailyPlan.filter(r=>!r._fromActual);

  // ---- Compute all date rows with running opening balance ----
  const allSorted=[...manualCF].filter(r=>r.date&&r.date.startsWith(filterYear)).sort((a,b)=>a.date.localeCompare(b.date));

  // Group all records by date (ignoring month filter for running balance)
  const allByDate={};
  allSorted.forEach(r=>{
    if(!allByDate[r.date])allByDate[r.date]={date:r.date,inflow:0,outflow:0,items:[]};
    if(r.type==='inflow')allByDate[r.date].inflow+=r.amount;
    else allByDate[r.date].outflow+=r.amount;
    allByDate[r.date].items.push(r);
  });

  // Build daily rows with OPEN/CLOSE balance
  let runBal=openingYear;
  const allDateRows=Object.values(allByDate).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>{
    const openBal=runBal;
    const net=d.inflow-d.outflow;
    runBal+=net;
    return{...d,openBal,net,closeBal:runBal};
  });

  // Apply month filter for display
  const dateRows=filterMonth
    ?allDateRows.filter(d=>d.date.startsWith(`${filterYear}-${String(filterMonth).padStart(2,'0')}`))
    :allDateRows;

  // ---- Monthly Summary ----
  const monthMap={};
  allDateRows.forEach(d=>{
    const mKey=d.date.slice(0,7); // YYYY-MM
    if(!monthMap[mKey])monthMap[mKey]={month:mKey,inflow:0,outflow:0,openBal:d.openBal};
    monthMap[mKey].inflow+=d.inflow;
    monthMap[mKey].outflow+=d.outflow;
    monthMap[mKey].closeBal=monthMap[mKey].openBal+monthMap[mKey].inflow-monthMap[mKey].outflow;
  });
  // Recalculate monthly opening balances sequentially
  let mRunBal=openingYear;
  const monthRows=Object.values(monthMap).sort((a,b)=>a.month.localeCompare(b.month)).map(m=>{
    const openBal=mRunBal;
    const net=m.inflow-m.outflow;
    mRunBal+=net;
    const mIdx=parseInt(m.month.slice(5),10)-1;
    return{...m,openBal,net,closeBal:mRunBal,label:`${MONTHS_TH[mIdx]} ${m.month.slice(0,4)}`};
  });

  // ---- Yearly Summary ----
  const yearMap={};
  allDateRows.forEach(d=>{
    const yr=d.date.slice(0,4);
    if(!yearMap[yr])yearMap[yr]={year:yr,inflow:0,outflow:0};
    yearMap[yr].inflow+=d.inflow;yearMap[yr].outflow+=d.outflow;
  });
  let yRunBal=openingYear;
  const yearRows=Object.values(yearMap).sort((a,b)=>a.year.localeCompare(b.year)).map(y=>{
    const openBal=yRunBal;
    const net=y.inflow-y.outflow;
    yRunBal+=net;
    return{...y,openBal,net,closeBal:yRunBal};
  });

  // KPI totals (filtered view)
  const viewRecs=dateRows; // already filtered
  const totalIn=viewRecs.reduce((s,d)=>s+d.inflow,0);
  const totalOut=viewRecs.reduce((s,d)=>s+d.outflow,0);
  const currentBal=allDateRows.length>0?allDateRows[allDateRows.length-1].closeBal:openingYear;
  const openingBal=dateRows.length>0?dateRows[0].openBal:openingYear;

  // Chart
  const chartData=allDateRows.slice(-14).map(d=>({label:d.date.slice(5),inflow:d.inflow,outflow:d.outflow,closeBal:d.closeBal}));

  function doExport(){
    const sheetDaily=[
      ['วันที่','ยอดยกมาต้นวัน','รับเงิน','จ่ายเงิน','เงินสดสุทธิ','ยอดคงเหลือสิ้นวัน'],
      ...allDateRows.map(d=>[d.date,d.openBal,d.inflow,d.outflow,d.net,d.closeBal])
    ];
    const sheetMonthly=[
      ['เดือน','ยอดยกมาต้นเดือน','รับเงินรวม','จ่ายเงินรวม','เงินสดสุทธิ','ยอดคงเหลือสิ้นเดือน'],
      ...monthRows.map(m=>[m.label,m.openBal,m.inflow,m.outflow,m.net,m.closeBal])
    ];
    const sheetYearly=[
      ['ปี','ยอดยกมาต้นปี','รับเงินรวม','จ่ายเงินรวม','เงินสดสุทธิ','ยอดคงเหลือสิ้นปี'],
      ...yearRows.map(y=>[y.year,y.openBal,y.inflow,y.outflow,y.net,y.closeBal])
    ];
    exportExcel([{name:'รายวัน',data:sheetDaily},{name:'รายเดือน',data:sheetMonthly},{name:'รายปี',data:sheetYearly}],'cashflow_full.xlsx');

  function doImportCF(rows,mode){
    const parsed=rows.map((r,i)=>({
      id:Date.now()+i,
      date:r['วันที่']||r.date||today(),
      type:r['ประเภท']||r.type||'inflow',
      category:r['หมวด']||r.category||DAILY_CATS.inflow[0],
      bank:r['ธนาคาร']||r.bank||BANKS[0],
      amount:+r['จำนวนเงิน']||+r.amount||0,
      desc:r['รายละเอียด']||r.desc||'',
      ref:r['อ้างอิง']||r.ref||'',
      source:'✏️Manual',
    }));
    const nr=mode==='replace'?parsed:[...dailyPlan,...parsed];
    setDailyPlan(nr);ls.set('daily_cashflow',nr);
    setMsg(`✅ ${mode==='replace'?'แทนที่':'เพิ่ม'} ${parsed.length} รายการ (รวม ${nr.length} รายการ)`);
  }

  const BAL_BG=v=>v>=0?'#f0fdf4':'#fff1f2';

                <button onClick={()=>setEditOpening(false)} className="btn btn-secondary">ยกเลิก</button>

                  <th>รายการ</th>
                </tr>
              </thead>
              <tbody>
                {dateRows.map(d=>(
                  <React.Fragment key={d.date}>

                      <td style={{textAlign:'right',color:'#3730a3',background:'#f0f0ff',fontWeight:600}}>฿{fmt(d.openBal)}</td>
                      <td style={{textAlign:'right',color:'#16a34a',fontWeight:600}}>{d.inflow?`฿${fmt(d.inflow)}`:'-'}</td>
                      <td style={{textAlign:'right',color:'#dc2626',fontWeight:600}}>{d.outflow?`฿${fmt(d.outflow)}`:'-'}</td>
                      <td style={{textAlign:'right',fontWeight:700,color:d.net>=0?'#7c3aed':'#dc2626'}}>{d.net>=0?'+':''}{fmt(d.net)}</td>
                      <td style={{textAlign:'right',fontWeight:800,fontSize:14,background:BAL_BG(d.closeBal),color:BAL_COLOR(d.closeBal)}}>฿{fmt(d.closeBal)}</td>
